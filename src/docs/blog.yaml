openapi: 3.0.0
info:
  title: Blog API
  version: 1.0.0

tags:
  - name: Blogs
    description: Blog post management (public reads, admin writes)

components:
  schemas:
    BlogCoverImage:
      type: object
      properties:
        url: { type: string, example: 'https://res.cloudinary.com/demo/image/upload/sample.jpg' }
        publicId: { type: string, example: 'blogs/sample' }
        alt: { type: string, example: 'Blog cover image' }

    BlogAuthor:
      type: object
      properties:
        _id: { type: string }
        firstName: { type: string }
        lastName: { type: string }
        avatar: { type: string }

    Blog:
      type: object
      properties:
        _id: { type: string, example: '64f1a2b3c4d5e6f7a8b9c0d1' }
        title: { type: string, example: 'Top 10 Ayurvedic Herbs for Immunity' }
        slug: { type: string, example: 'top-10-ayurvedic-herbs-for-immunity' }
        content: { type: string, example: '<p>Full blog content here...</p>' }
        excerpt: { type: string, example: 'A brief overview of top immunity herbs.' }
        author: { $ref: '#/components/schemas/BlogAuthor' }
        category: { type: string, example: 'Health & Wellness' }
        tags: { type: array, items: { type: string }, example: ['ayurveda', 'immunity', 'herbs'] }
        coverImage: { $ref: '#/components/schemas/BlogCoverImage' }
        status: { type: string, enum: [draft, published, archived], example: published }
        publishedAt: { type: string, format: date-time }
        views: { type: integer, example: 1240 }
        likes: { type: integer, example: 87 }
        isFeatured: { type: boolean, example: true }
        metaTitle: { type: string, example: 'Top 10 Ayurvedic Herbs' }
        metaDescription: { type: string, example: 'Discover the best Ayurvedic herbs for boosting immunity.' }
        metaKeywords: { type: array, items: { type: string } }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    BlogListItem:
      type: object
      properties:
        _id: { type: string }
        title: { type: string }
        slug: { type: string }
        excerpt: { type: string }
        coverImage: { $ref: '#/components/schemas/BlogCoverImage' }
        author: { $ref: '#/components/schemas/BlogAuthor' }
        category: { type: string }
        tags: { type: array, items: { type: string } }
        publishedAt: { type: string, format: date-time }
        views: { type: integer }
        likes: { type: integer }
        isFeatured: { type: boolean }

    CreateBlogBody:
      type: object
      required: [title, content]
      properties:
        title: { type: string, minLength: 3, maxLength: 300, example: 'Top 10 Ayurvedic Herbs' }
        content: { type: string, minLength: 10, example: '<p>Full blog content...</p>' }
        excerpt: { type: string, maxLength: 500, example: 'A brief overview.' }
        category: { type: string, example: 'Health & Wellness' }
        tags: { type: array, items: { type: string }, example: ['ayurveda', 'immunity'] }
        status: { type: string, enum: [draft, published, archived], default: draft }
        isFeatured: { type: boolean, default: false }
        metaTitle: { type: string, maxLength: 60 }
        metaDescription: { type: string, maxLength: 160 }
        metaKeywords: { type: array, items: { type: string } }
        coverImage: { type: string, format: binary, description: 'Cover image file (multipart/form-data)' }

    PaginationMeta:
      type: object
      properties:
        page: { type: integer }
        limit: { type: integer }
        total: { type: integer }
        totalPages: { type: integer }

paths:
  /blogs:
    get:
      tags: [Blogs]
      summary: List published blogs
      description: Returns paginated list of published blog posts with optional filtering.
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
        - name: category
          in: query
          schema: { type: string }
          description: Filter by category name (case-insensitive)
        - name: tags
          in: query
          schema: { type: string }
          description: Comma-separated tags to filter by
        - name: author
          in: query
          schema: { type: string }
          description: Filter by author ObjectId
        - name: isFeatured
          in: query
          schema: { type: string, enum: ['true', 'false'] }
      responses:
        '200':
          description: Paginated blog list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: 'Fetched successfully.' }
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/BlogListItem' }
                  meta:
                    type: object
                    properties:
                      pagination: { $ref: '#/components/schemas/PaginationMeta' }

    post:
      tags: [Blogs]
      summary: Create a new blog post (Admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema: { $ref: '#/components/schemas/CreateBlogBody' }
      responses:
        '201':
          description: Blog created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  message: { type: string, example: 'Blog created successfully.' }
                  data: { $ref: '#/components/schemas/Blog' }
        '400':
          description: Validation error
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — Admin only

  /blogs/search:
    get:
      tags: [Blogs]
      summary: Full-text search across blogs
      parameters:
        - name: q
          in: query
          required: false
          schema: { type: string }
          description: Search query (searches title, content, tags, excerpt)
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: category
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Search results

  /blogs/featured:
    get:
      tags: [Blogs]
      summary: Get featured blog posts
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 6 }
          description: Max number of featured blogs to return
      responses:
        '200':
          description: List of featured blogs
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/BlogListItem' }

  /blogs/admin/all:
    get:
      tags: [Blogs]
      summary: List all blogs regardless of status (Admin)
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: status
          in: query
          schema: { type: string, enum: [draft, published, archived] }
        - name: author
          in: query
          schema: { type: string }
      responses:
        '200':
          description: All blogs (admin view)

  /blogs/admin/{id}:
    get:
      tags: [Blogs]
      summary: Get any blog by ID (Admin)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Blog detail
        '404':
          description: Blog not found

  /blogs/{id}:
    put:
      tags: [Blogs]
      summary: Update a blog post (Admin)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          multipart/form-data:
            schema: { $ref: '#/components/schemas/CreateBlogBody' }
      responses:
        '200':
          description: Updated blog
        '404':
          description: Blog not found

    delete:
      tags: [Blogs]
      summary: Delete a blog post (Admin)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Blog deleted
        '404':
          description: Blog not found

  /blogs/{id}/publish:
    patch:
      tags: [Blogs]
      summary: Publish a blog post (Admin)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Blog published
        '409':
          description: Already published

  /blogs/{id}/unpublish:
    patch:
      tags: [Blogs]
      summary: Unpublish a blog post (Admin)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Blog set back to draft

  /blogs/{id}/like:
    post:
      tags: [Blogs]
      summary: Like a blog post (public)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Like count incremented

  /blogs/{slug}:
    get:
      tags: [Blogs]
      summary: Get a published blog by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
          example: top-10-ayurvedic-herbs-for-immunity
      responses:
        '200':
          description: Blog detail with view increment
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: '#/components/schemas/Blog' }
        '404':
          description: Blog not found
